<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Lofi Music Player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://www.youtube.com/iframe_api"></script>
</head>

<body>

  <!-- Background gif -->
  <div class="background">
    <img id="background-gif" src="gif/gif1.gif" />
    <div id="grain"></div>
    <div id="scanlines"></div>
    <div id="vignette"></div>
    <div id="dimmer"></div>
  </div>

  <!-- Top-right: toggle-hide-ui ABOVE cursor picker -->
  <div id="top-right-controls">
    <button id="toggle-sleep">sleep timer</button>
    <button id="toggle-pomodoro">pomodoro</button>
    <button id="toggle-hide-ui">◐</button>
    <div id="cursor-picker">
      <button id="toggle-cursor-picker">✦</button>
      <div id="cursor-options"></div>
    </div>
  </div>

  <!-- Top-left: Ambient Sounds -->
  <div id="ambient-panel">
    <div id="ambient-label">Ambient Sounds</div>
    <div id="ambient-sounds">
      <div class="ambient-track">
        <span class="ambient-name">Rain</span>
        <div class="ambient-vol-wrap">
          <input type="range" class="ambient-slider" data-sound="rain" min="0" max="100" value="0" />
        </div>
      </div>
      <div class="ambient-track">
        <span class="ambient-name">Waves</span>
        <div class="ambient-vol-wrap">
          <input type="range" class="ambient-slider" data-sound="waves" min="0" max="100" value="0" />
        </div>
      </div>
      <div class="ambient-track">
        <span class="ambient-name">Birds</span>
        <div class="ambient-vol-wrap">
          <input type="range" class="ambient-slider" data-sound="birds" min="0" max="100" value="0" />
        </div>
      </div>
      <div class="ambient-track">
        <span class="ambient-name">Campfire</span>
        <div class="ambient-vol-wrap">
          <input type="range" class="ambient-slider" data-sound="campfire" min="0" max="100" value="0" />
        </div>
      </div>
      <div class="ambient-track">
        <span class="ambient-name">Cafe</span>
        <div class="ambient-vol-wrap">
          <input type="range" class="ambient-slider" data-sound="cafe" min="0" max="100" value="0" />
        </div>
      </div>
    </div>
  </div>

  <!-- Main App Container -->
  <div class="app">
    <div id="ui-layer">
      <div id="main-title">Lofi Music Player</div>
      <div id="song-title"><a id="song-title-link" target="_blank" rel="noopener noreferrer"><span>Loading lofi vibes...</span></a></div>

      <!-- Controls (no shuffle) -->
      <div class="controls">
        <button id="prev">⏮</button>
        <button id="play-pause">▶</button>
        <button id="next">⏭</button>

        <!-- Volume Control -->
        <div class="volume-control">
          <button id="mute-btn">≡</button>
          <div id="volume-bars"></div>
        </div>
      </div>
    </div>

    <!-- Encouragement widget -->
    <div id="encouragement">
      <span id="encouragement-text"></span><span id="encouragement-cursor">|</span>
    </div>
  </div>

  <!-- Weather widget -->
  <div id="weather-widget">
    <div id="weather-time">--:--</div>
    <div id="weather-date">--- --, ----</div>
    <div id="weather-location">--</div>
    <div id="weather-row">
      <span id="weather-icon">--</span>
      <span id="weather-temp">--°C / --°F</span>
    </div>
  </div>

  <!-- YouTube player (hidden) -->
  <div id="player"></div>

  <!-- Bottom-center: GIF + Playlist pickers -->
  <div id="bottom-center-controls">
    <button id="open-gif-picker" class="bottom-icon-btn">
      <span class="bottom-btn-label">Background</span>
    </button>
    <button id="open-playlist-picker" class="bottom-icon-btn">
      <span class="bottom-btn-label">Playlist</span>
    </button>
  </div>

  <!-- GIF Picker Card -->
  <div id="gif-picker-card" class="picker-card hidden-card">
    <div class="picker-card-header">
      <span class="picker-card-title">Choose Background</span>
      <button class="picker-card-close">✕</button>
    </div>
    <div class="picker-card-grid" id="gif-grid"></div>
  </div>

  <!-- Playlist Picker Card -->
  <div id="playlist-picker-card" class="picker-card hidden-card">
    <div class="picker-card-header">
      <span class="picker-card-title">Choose Track</span>
      <button class="picker-card-close">✕</button>
    </div>

    <!-- Tabs -->
    <div class="playlist-tabs">
      <button class="playlist-tab active" data-mode="default">Default</button>
      <button class="playlist-tab" data-mode="custom">Custom</button>
    </div>

    <!-- Default playlist -->
    <div class="picker-card-list playlist-mode-list" id="playlist-list" data-mode="default"></div>

    <!-- Custom playlist -->
    <div class="playlist-mode-list hidden-mode" data-mode="custom">
      <div id="custom-add-row">
        <input type="text" id="custom-url-input" placeholder="Paste a YouTube URL..." />
        <button id="custom-add-btn">+</button>
      </div>
      <div class="picker-card-list" id="custom-playlist-list">
        <div id="custom-empty-state">No custom tracks yet.<br/>Paste a YouTube URL above to add one.</div>
      </div>
    </div>
  </div>

  <div id="pomodoro-card" class="hidden-pomodoro">
    <div id="pomodoro-display">25:00</div>
      <div class="pomodoro-btns">
      <button class="pom-btn" id="pom-start">Start</button>
      <button class="pom-btn" id="pom-pause">Pause</button>
      <button class="pom-btn" id="pom-stop">Stop</button>
    </div>
    <div class="pomodoro-btns">
    <button class="pom-btn" id="pom-add5">+5 Min</button>
    </div>
</div>

<div id="sleep-card" class="hidden-pomodoro">
  <div id="sleep-display">-- : --</div>
  <div class="pomodoro-btns">
    <button class="pom-btn sleep-preset" data-mins="15">15 min</button>
    <button class="pom-btn sleep-preset" data-mins="20">20 min</button>
    <button class="pom-btn sleep-preset" data-mins="30">30 min</button>
  </div>
  <div class="pomodoro-btns">
    <button class="pom-btn" id="sleep-cancel">Cancel</button>
  </div>
</div>

  <script src="player.js"></script>
</body>
</html>
